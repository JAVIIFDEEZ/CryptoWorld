# nginx.conf — Configuración para servir la SPA React
#
# El bloque `location /` con `try_files` es esencial para SPAs:
# si la ruta no existe como archivo físico, sirve index.html
# para que React Router gestione la navegación del lado cliente.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Rutas de la SPA → siempre index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Headers de caché para assets compilados con hash en el nombre
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Seguridad básica
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
}
