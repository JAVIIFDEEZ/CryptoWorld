# docker-compose.frontend-dev.yml
#
# Levanta SOLO el frontend con Vite en modo desarrollo (hot-reload).
# No requiere el backend ni PostgreSQL.
# Útil para iterar sobre el diseño de páginas de login/registro.
#
# Uso:
#   docker compose -f docker-compose.frontend-dev.yml up
#   Abrir: http://localhost:5173/login
#          http://localhost:5173/register

services:
  frontend-dev:
    image: node:20-alpine
    container_name: cryptoworld_frontend_dev
    working_dir: /app
    volumes:
      # Montar el código fuente para hot-reload
      - ./frontend:/app
      # Montar node_modules en volumen separado para no sobreescribir los del contenedor
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api
    # Instalar dependencias si es la primera vez, luego arrancar Vite
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  frontend_node_modules:
