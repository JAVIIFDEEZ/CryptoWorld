# pytest.ini — Configuración de pytest para el backend
#
# pytest-django necesita saber qué módulo de settings usar.
# El PYTHONPATH apunta a src/ para que los imports funcionen.

[pytest]
DJANGO_SETTINGS_MODULE = config.settings
pythonpath = src
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --tb=short
    -v
    --cov=core
    --cov-report=term-missing

markers =
    unit: Tests unitarios (sin base de datos ni servicios externos)
    integration: Tests de integración (requieren base de datos)
    e2e: Tests end-to-end
